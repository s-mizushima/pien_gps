services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: photo-gps-app
    ports:
      - "3000:3000"
    volumes:
      # ソースコードをマウントしてホットリロード
      - ./app:/app
      # node_modules はホストと分離 (名前付きボリューム)
      - node_modules:/app/node_modules
      # .next キャッシュもホストと分離
      - next_cache:/app/.next
    environment:
      # macOS + Docker Desktop でのファイル変更検知を安定化
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    env_file:
      - .env.local
    command: pnpm dev
    tty: true
    stdin_open: true

volumes:
  node_modules:
  next_cache:
